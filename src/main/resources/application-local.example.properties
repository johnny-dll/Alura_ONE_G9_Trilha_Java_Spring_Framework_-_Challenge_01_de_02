# Nome da aplica\u00E7\u00E3o
spring.application.name=literalura

# URL de conex\u00E3o: 'localhost' funciona pois o Java e o Postgres est\u00E3o no mesmo ambiente (WSL2)
# 'literalura_db' \u00E9 o nome do banco que voc\u00EA criou com o comando CREATE DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/literalura_db
spring.datasource.username=usuario_exemplo
spring.datasource.password=senha_exemplo

# Driver oficial do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrat\u00E9gia do Hibernate: 'update' cria as tabelas automaticamente baseado nas entidades Java
spring.jpa.hibernate.ddl-auto=update

# Dialect do Hibernate para PostgreSQL (ajuda o ORM a gerar SQL otimizado para o Postgres)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configura\u00E7\u00F5es de Log: Mostra as queries SQL no console (\u00FAtil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Timezone do PostgreSQL para evitar problemas com datas
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Reduz logs do Hibernate
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn