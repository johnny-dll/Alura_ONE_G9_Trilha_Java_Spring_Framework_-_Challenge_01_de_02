# Nome da aplica\u00E7\u00E3o
spring.application.name=literalura

# Ativa o profile LOCAL
spring.profiles.active=local

# URL de conex\u00E3o: 'localhost' funciona pois o Java e o Postgres est\u00E3o no mesmo ambiente (WSL2)
spring.datasource.url=jdbc:postgresql://localhost:5432/literalura_db
spring.datasource.username=postgres
spring.datasource.password=  # a senha real deve ficar no application-local.properties

# Driver oficial do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrat\u00E9gia do Hibernate: 'update' cria as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Dialect do Hibernate para PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configura\u00E7\u00F5es de Log
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true