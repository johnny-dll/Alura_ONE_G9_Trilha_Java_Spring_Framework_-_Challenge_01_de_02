# Nome da aplica\u00E7\u00E3o
spring.application.name=literalura

# Ativa o profile LOCAL
spring.profiles.active=local

# Configura\u00E7\u00F5es do banco de dados
# A senha real deve ficar no application-local.properties (n\u00E3o versionado) ou em vari\u00E1vel de ambiente
spring.datasource.url=jdbc:postgresql://localhost:5432/literalura_db
spring.datasource.username=postgres
spring.datasource.password=

# Driver oficial do PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrat\u00E9gia do Hibernate: 'update' cria as tabelas automaticamente baseado nas entidades
spring.jpa.hibernate.ddl-auto=update

# Dialect do Hibernate para PostgreSQL (gera SQL otimizado para o Postgres)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configura\u00E7\u00F5es de log do Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Reduz logs do Hibernate
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn